# Canopy model connections
#
# Each connection has:
#   id          — used as MODEL_BACKEND value and in benchmark output
#   backend     — "anthropic" or "azure"
#   api_style   — Azure only; one of:
#                   "azure-inference"   (default) azure-ai-inference SDK, /models endpoint
#                   "openai-compat"     OpenAI SDK, /openai/v1/chat/completions
#                   "openai-responses"  urllib POST to /openai/v1/responses (Responses API)
#   active      — false = skip in benchmark until deployment is activated by admin
#   endpoint    — Azure only; base URL for this connection path
#   api_key_env — name of the .env variable that holds the API key
#   models      — list of deployment names to test; empty list = auto-discover
#   timeout     — optional, seconds (default: 60)
#
# All four capa connections share the same key (AZURE_CAPA_API_KEY) on the
# same resource (capa-4249-resource). The endpoint path differs per deployment.

connections:
  # ------------------------------------------------------------------
  # Anthropic (personal key — Azure does not support Anthropic models)
  # ------------------------------------------------------------------
  - id: claude-sonnet
    backend: anthropic
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-6
    timeout: 60

  # ------------------------------------------------------------------
  # Azure capa — gpt-5.1-codex-mini (OpenAI Responses API, active)
  # POST /openai/v1/responses — different request/response shape from
  # chat completions; handled by AzureResponsesClient
  # ------------------------------------------------------------------
  - id: gpt-5.1-codex-mini
    backend: azure
    api_style: openai-responses
    active: true
    endpoint: https://capa-4249-resource.services.ai.azure.com/openai/v1/
    api_key_env: AZURE_CAPA_API_KEY
    models:
      - gpt-5.1-codex-mini
    timeout: 60

  # ------------------------------------------------------------------
  # Azure capa — gpt-5.1-2 (project-scoped openai/v1 path, active)
  # Uses /api/projects/<id>/openai/v1/chat/completions — no api-version
  # required. Requires max_completion_tokens instead of max_tokens.
  # ------------------------------------------------------------------
  - id: gpt-5.1-2
    backend: azure
    api_style: openai-compat
    active: true
    endpoint: https://capa-4249-resource.services.ai.azure.com/api/projects/capa-4249/openai/v1/
    api_key_env: AZURE_CAPA_API_KEY
    models:
      - gpt-5.1-2
    timeout: 60

  # ------------------------------------------------------------------
  # Azure capa — Phi-4 (inactive until admin activates the deployment)
  # Standard OpenAI-compatible chat completions path
  # ------------------------------------------------------------------
  - id: phi-4
    backend: azure
    api_style: openai-compat
    active: false
    endpoint: https://capa-4249-resource.services.ai.azure.com/openai/v1/
    api_key_env: AZURE_CAPA_API_KEY
    models:
      - Phi-4
    timeout: 60

  # ------------------------------------------------------------------
  # Azure capa — Qwen3-4B (inactive until admin activates the deployment)
  # Standard OpenAI-compatible chat completions path
  # ------------------------------------------------------------------
  - id: qwen-3-4b
    backend: azure
    api_style: openai-compat
    active: false
    endpoint: https://capa-4249-resource.services.ai.azure.com/openai/v1/
    api_key_env: AZURE_CAPA_API_KEY
    models:
      - qwen--qwen3-4b-instruct-2507
    timeout: 60
